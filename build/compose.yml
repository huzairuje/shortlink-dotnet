services:
  api:
    build:
      context: ..
      dockerfile: build/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development    # ← tambah ini
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - DATA_PATH=/data
    volumes:
      - ../data:/data
    restart: unless-stopped